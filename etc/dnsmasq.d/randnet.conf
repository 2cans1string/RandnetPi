# Randnet domains resolve to this Pi's eth0 IP.
# __ETH0_IP__ is a placeholder that install_randnet.sh replaces with the
# detected eth0 address at install time (e.g. 10.102.12.53). Do not hardcode
# 127.0.0.1 here — loopback targets do not work for forwarded ppp0 traffic.
address=/randnet.ne.jp/__ETH0_IP__
address=/login.randnet.ne.jp/__ETH0_IP__
address=/www.randnet.ne.jp/__ETH0_IP__
address=/member.randnet.ne.jp/__ETH0_IP__
address=/mail.randnet.ne.jp/__ETH0_IP__
address=/news.randnet.ne.jp/__ETH0_IP__
address=/service.randnet.ne.jp/__ETH0_IP__
address=/peach.randnet.ne.jp/__ETH0_IP__
address=/keiba.randnet.ne.jp/__ETH0_IP__
address=/randnetdd.co.jp/__ETH0_IP__
address=/www.randnetdd.co.jp/__ETH0_IP__
